<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>消えていく会話</title>
<style>
  :root {
    --bg: #f4f1ec;
    --ink: #2b2724;
    --muted: #9a938a;
    --mine: #3a3530;
    --mine-text: #f7f4ef;
    --ghost-line: #cfc7ba;
    --bar: #ffffff;
    --accent: #b08968;
    --shadow: rgba(0,0,0,.08);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* ---- lobby ---- */
  #lobby {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    align-items: center; gap: 18px; padding: 28px; text-align: center;
  }
  #lobby p { color: var(--muted); font-size: 13.5px; line-height: 1.8; margin: 0; max-width: 320px; }
  .lobby-section { width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 10px; }
  .lobby-section button {
    border: 1px solid #e3dccf; background: #fff; border-radius: 14px;
    padding: 14px; font-size: 15px; font-weight: 600; color: var(--ink); cursor: pointer;
  }
  .lobby-section button small { display: block; font-weight: 400; color: var(--muted); font-size: 12px; margin-top: 3px; }
  .lobby-section button:active { background: #fffaf3; border-color: var(--accent); }
  .lobby-divider { color: var(--muted); font-size: 12px; }
  .lobby-section input {
    border: 1px solid #e3dccf; border-radius: 12px; padding: 10px 14px;
    font-size: 16px; background: #fbf9f5; text-align: center; width: 100%;
  }
  .lobby-section input:focus { outline: none; border-color: var(--accent); }
  #lobbyStatus {
    font-size: 13px; color: var(--accent); min-height: 20px;
  }
  .room-id-display {
    font-size: 20px; font-weight: 700; letter-spacing: 2px;
    color: var(--ink); padding: 10px; background: #fbf9f5;
    border: 1px dashed #e3dccf; border-radius: 12px; text-align: center;
    user-select: all; -webkit-user-select: all;
  }

  /* ---- header ---- */
  header {
    flex: 0 0 auto; background: var(--bar); border-bottom: 1px solid #ece6dc;
    padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
    display: flex; align-items: center; gap: 10px;
    position: relative;
  }
  .header-spacer { flex: 1; }
  .menu-btn {
    border: 0; background: transparent; color: var(--ink); font-size: 22px;
    padding: 4px; cursor: pointer; line-height: 1;
  }

  /* ---- menu panel ---- */
  .menu-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.25); z-index: 90;
  }
  .menu-panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: 260px;
    background: var(--bar); z-index: 100;
    box-shadow: -4px 0 16px var(--shadow);
    padding: calc(20px + env(safe-area-inset-top)) 20px 20px;
    display: flex; flex-direction: column; gap: 20px;
    animation: slideIn .2s ease;
  }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .menu-panel h3 { margin: 0; font-size: 14px; font-weight: 600; }
  .menu-item { font-size: 13px; color: var(--muted); line-height: 1.8; }
  .menu-item b { color: var(--ink); font-weight: 600; }
  .menu-action {
    border: 1px solid #e3dccf; background: #fff; border-radius: 10px;
    padding: 10px; font-size: 14px; color: var(--ink); cursor: pointer; text-align: left;
  }
  .menu-action:active { background: #fbf9f5; }

  /* ---- thread ---- */
  .thread {
    flex: 1 1 auto; overflow-y: auto; padding: 16px 14px 8px;
    display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch;
  }
  .row { display: flex; }
  .row.right { justify-content: flex-end; }
  .row.left  { justify-content: flex-start; align-items: flex-start; }
  .bubble-row-wrap { max-width: 70%; width: fit-content; position: relative; }
  .bubble {
    padding: 10px 13px; border-radius: 18px;
    font-size: 15.5px; line-height: 1.45; word-break: break-word;
    position: relative; animation: pop .18s ease;
  }
  @keyframes pop { from { transform: scale(.96); opacity:.4 } to { transform: scale(1); opacity:1 } }
  .bubble.mine  { background: var(--mine); color: var(--mine-text); border-bottom-right-radius: 5px; }
  .bubble.them  { background: #fff; color: var(--ink); border:1px solid #ece6dc; border-bottom-left-radius: 5px; }
  .reaction {
    font-size: 20px; display: inline-block;
    background: #fff; border: 1px solid #ece6dc; border-radius: 999px;
    padding: 1px 6px; margin-top: -6px; position: relative; z-index: 1;
    animation: pop .18s ease;
  }
  .row.left .reaction { margin-left: 8px; }
  .row.right .reaction { margin-right: 8px; align-self: flex-end; }
  .bubble.ghost {
    background: transparent; border: 1px dashed var(--ghost-line); color: transparent;
    min-width: 54px; min-height: 38px; border-radius: 18px; border-bottom-left-radius: 5px;
    user-select: none; -webkit-user-select: none;
  }
  .ghost-fade { animation: fade .9s ease forwards; }
  @keyframes fade {
    0%   { color: var(--ink); border-color: transparent; background:#fff; }
    100% { color: transparent; border-color: var(--ghost-line); background: transparent; }
  }
  .empty { margin: auto; color: var(--muted); font-size: 13px; text-align:center; line-height:1.9; padding: 0 30px; }

  /* ---- reaction trigger & picker ---- */
  .react-trigger {
    border: 0; background: #f1ebe1; border-radius: 50%; width: 24px; height: 24px;
    font-size: 12px; line-height: 1; color: var(--muted); flex: 0 0 auto;
    margin-top: 4px; cursor: pointer;
  }
  .react-trigger:active { transform: scale(.9); }
  .react-picker {
    display: flex; gap: 4px; background: #fff; border: 1px solid #ece6dc;
    border-radius: 999px; padding: 4px 8px; box-shadow: 0 4px 12px var(--shadow);
    position: absolute; left: 0; bottom: calc(100% + 6px); z-index: 10;
    animation: pop .15s ease;
  }
  .react-picker button {
    border: 0; background: transparent; font-size: 22px; padding: 4px;
    border-radius: 50%; width: 36px; height: 36px; line-height: 1; cursor: pointer;
  }
  .react-picker button:hover { background: #f4f1ec; }
  .react-picker button:active { transform: scale(.85); }

  /* ---- composer ---- */
  .composer {
    flex: 0 0 auto; background: var(--bar); border-top: 1px solid #ece6dc;
    padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
  }
  .inputrow { display:flex; gap:8px; align-items:flex-end; }
  textarea {
    flex:1; resize:none; border:1px solid #e3dccf; border-radius:20px;
    padding:10px 14px; font-size:16px; font-family:inherit; max-height:120px; line-height:1.4; background:#fbf9f5;
  }
  textarea:focus { outline:none; border-color: var(--accent); }
  .send { flex:0 0 auto; border:0; background: var(--mine); color:#fff; border-radius:50%; width:44px; height:44px; font-size:18px; }
  .send:disabled { opacity:.35; }

  .hidden { display: none !important; }
</style>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
  <!-- ロビー -->
  <div id="lobby">
    <p>二つの端末でこのページを開き、片方が「ルームを作る」、もう片方が表示されたIDを入力して「接続する」と会話がはじまります。</p>
    <div id="lobbyStatus"></div>

    <div class="lobby-section" id="lobbyCreate">
      <button id="createBtn">ルームを作る<small>IDが発行されます。相手に共有してください</small></button>
    </div>

    <div class="lobby-divider">または</div>

    <div class="lobby-section" id="lobbyJoin">
      <input id="joinInput" placeholder="相手のルームIDを入力" autocomplete="off" />
      <button id="joinBtn">接続する</button>
    </div>
  </div>

  <!-- チャット -->
  <header class="hidden" id="chatHeader">
    <div class="header-spacer"></div>
    <button class="menu-btn" id="menuBtn" title="メニュー">☰</button>
  </header>

  <div class="thread hidden" id="thread"></div>

  <div class="composer hidden" id="composer">
    <div class="inputrow">
      <textarea id="input" rows="1" placeholder="メッセージを入力…"></textarea>
      <button class="send" id="sendBtn" disabled>↑</button>
    </div>
  </div>

<script>
/* =========================================================
   PeerJS Transport
   ========================================================= */
class PeerJSTransport {
  constructor(onMessage, onConnected) {
    this.conn = null;
    this.onMessage = onMessage;
    this.onConnected = onConnected;
    this.peer = null;
    this.queue = [];
  }

  createRoom(onRoomId) {
    this.peer = new Peer();
    this.peer.on("open", (id) => {
      onRoomId(id);
    });
    this.peer.on("connection", (conn) => {
      this._setupConn(conn);
    });
    this.peer.on("error", (err) => {
      setStatus("エラー: " + err.type);
    });
  }

  joinRoom(roomId) {
    this.peer = new Peer();
    this.peer.on("open", () => {
      const conn = this.peer.connect(roomId, { reliable: true });
      this._setupConn(conn);
    });
    this.peer.on("error", (err) => {
      if (err.type === "peer-unavailable") {
        setStatus("そのルームIDは見つかりませんでした");
      } else {
        setStatus("エラー: " + err.type);
      }
    });
  }

  _setupConn(conn) {
    this.conn = conn;
    conn.on("open", () => {
      for (const obj of this.queue) conn.send(obj);
      this.queue = [];
      if (this.onConnected) this.onConnected();
    });
    conn.on("data", (data) => {
      this.onMessage(data);
    });
    conn.on("close", () => {
      setStatus("相手との接続が切れました");
    });
  }

  send(obj) {
    if (this.conn && this.conn.open) {
      this.conn.send(obj);
    } else {
      this.queue.push(obj);
    }
  }

  close() {
    if (this.conn) this.conn.close();
    if (this.peer) this.peer.destroy();
  }
}

/* =========================================================
   状態
   ========================================================= */
const STAMPS = ["👍","❤️","😂","🙏","😮","😢","✨","👀"];
let myId = null;
let roomId = null;
let transport = null;

let history = [];
let pendingMessages = [];
let fadeIds = new Set();
let startedAt = null;
let updatedAt = null;

const storeKey = () => `kieru_remote_v1::${roomId}::${myId}`;

function save() {
  localStorage.setItem(storeKey(), JSON.stringify({ history, startedAt, updatedAt }));
}
function loadLocal() {
  try {
    const s = JSON.parse(localStorage.getItem(storeKey()));
    if (s && Array.isArray(s.history)) {
      history = s.history;
      startedAt = s.startedAt || null;
      updatedAt = s.updatedAt || null;
    }
  } catch (e) {}
}
function now() {
  const d = new Date();
  return ("0"+d.getHours()).slice(-2) + ":" + ("0"+d.getMinutes()).slice(-2);
}

/* =========================================================
   ロビー
   ========================================================= */
const $ = (id) => document.getElementById(id);

function setStatus(msg) {
  $("lobbyStatus").textContent = msg;
}

function enterChat() {
  myId = sessionStorage.getItem("kieru_wid");
  if (!myId) {
    myId = "w-" + Math.random().toString(36).slice(2, 10);
    sessionStorage.setItem("kieru_wid", myId);
  }
  loadLocal();

  $("lobby").classList.add("hidden");
  $("chatHeader").classList.remove("hidden");
  $("thread").classList.remove("hidden");
  $("composer").classList.remove("hidden");

  transport.send({ type: "hello", from: myId });
  render();
}

// ルームを作る
$("createBtn").addEventListener("click", () => {
  $("createBtn").disabled = true;
  setStatus("ルームを準備しています…");

  transport = new PeerJSTransport(onMessage, () => {
    setStatus("接続しました！");
    enterChat();
  });

  transport.createRoom((id) => {
    roomId = id;
    setStatus("相手の接続を待っています…");
    // ルームIDを表示
    const createSection = $("lobbyCreate");
    createSection.innerHTML = "";
    const label = document.createElement("div");
    label.style.cssText = "font-size:12px;color:var(--muted);margin-bottom:4px";
    label.textContent = "このルームIDを相手に共有してください";
    createSection.appendChild(label);
    const idBox = document.createElement("div");
    idBox.className = "room-id-display";
    idBox.textContent = id;
    createSection.appendChild(idBox);
    // 接続側を無効化
    $("lobbyJoin").classList.add("hidden");
  });
});

// ルームに接続する
$("joinBtn").addEventListener("click", () => {
  const id = $("joinInput").value.trim();
  if (!id) { setStatus("ルームIDを入力してください"); return; }
  $("joinBtn").disabled = true;
  setStatus("接続しています…");
  roomId = id;

  transport = new PeerJSTransport(onMessage, () => {
    setStatus("接続しました！");
    enterChat();
  });
  transport.joinRoom(id);
});

/* =========================================================
   受信
   ========================================================= */
function onMessage(obj) {
  if (!obj || obj.from === myId) return;

  if (obj.type === "hello") {
    const lastMine = [...history].reverse().find(e => e.side === "me");
    if (lastMine) {
      transport.send({ type:"msg", from: myId, kind: lastMine.kind,
                       content: lastMine.content, time: lastMine.time, id: lastMine.id });
    }
    return;
  }

  if (obj.type === "msg") {
    if (pendingMessages.some(p => p.id === obj.id)) return;
    if (history.some(e => e.id === obj.id)) return;

    if (!startedAt) startedAt = new Date().toISOString();
    updatedAt = new Date().toISOString();
    pendingMessages.push({ kind: obj.kind, content: obj.content, time: obj.time, id: obj.id });
    save();
    render();
  }

  if (obj.type === "reaction") {
    const target = history.find(e => e.id === obj.targetId && e.side === "me");
    if (target) target.stamp = obj.stamp;
    save();
    render();
  }
}

/* =========================================================
   送信
   ========================================================= */
function sendMessage(content) {
  fadeIds = new Set();
  for (const p of pendingMessages) {
    fadeIds.add("fade-" + p.id);
    const entry = { side: "them", ghost: true, time: p.time, id: p.id, len: p.content.length };
    if (p.stamp) entry.stamp = p.stamp;
    history.push(entry);
  }
  pendingMessages = [];

  const id = Date.now() + "-" + Math.random().toString(36).slice(2,6);
  const t = now();
  if (!startedAt) startedAt = new Date().toISOString();
  updatedAt = new Date().toISOString();
  history.push({ side: "me", kind: "text", content, time: t, id });
  transport.send({ type: "msg", from: myId, kind: "text", content, time: t, id });

  save();
  render();
  fadeIds = new Set();
}

function sendReaction(targetId, stamp) {
  const inPending = pendingMessages.find(p => p.id === targetId);
  if (inPending) {
    inPending.stamp = stamp;
  } else {
    const inHistory = history.find(e => e.id === targetId && e.side === "them");
    if (inHistory) inHistory.stamp = stamp;
  }
  transport.send({ type: "reaction", from: myId, stamp, targetId });
  save();
  render();
}

/* =========================================================
   描画
   ========================================================= */
const $thread = () => $("thread");

function formatTime(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  const mo = d.getMonth() + 1, da = d.getDate();
  const h = ("0"+d.getHours()).slice(-2), m = ("0"+d.getMinutes()).slice(-2);
  return `${mo}/${da} ${h}:${m}`;
}

function render() {
  $("input").placeholder = "メッセージを入力…";

  const th = $thread();
  th.innerHTML = "";

  if (history.length === 0 && pendingMessages.length === 0) {
    const e = document.createElement("div");
    e.className = "empty";
    e.textContent = "最初のひとことを送ってみてください。";
    th.appendChild(e);
    return;
  }

  for (const m of history) {
    th.appendChild(renderBubble(m));
  }
  for (const p of pendingMessages) {
    th.appendChild(renderBubble({ side:"them", kind: p.kind, content: p.content, time: p.time, id: p.id, stamp: p.stamp }));
  }

  th.scrollTop = th.scrollHeight;
}

let openPickerId = null;

function closePicker() {
  openPickerId = null;
  document.querySelectorAll(".react-picker").forEach(el => el.remove());
}

function renderBubble(m) {
  const mine = m.side === "me";
  const row = document.createElement("div");
  row.className = "row " + (mine ? "right" : "left");

  const wrap = document.createElement("div");
  wrap.className = "bubble-row-wrap";

  const b = document.createElement("div");
  let cls = "bubble " + (mine ? "mine" : "them");
  if (m.ghost) {
    cls += " ghost";
    if (fadeIds.has("fade-" + m.id)) cls += " ghost-fade";
  }
  b.className = cls;
  b.textContent = m.ghost ? Array(m.len || 3).fill("　").join("​") : (m.content || "");
  wrap.appendChild(b);

  if (m.stamp) {
    const r = document.createElement("div");
    r.className = "reaction";
    r.textContent = m.stamp;
    wrap.appendChild(r);
  }

  row.appendChild(wrap);

  if (!mine && m.id) {
    const trigger = document.createElement("button");
    trigger.className = "react-trigger";
    trigger.textContent = "☺";
    trigger.addEventListener("click", (e) => {
      e.stopPropagation();
      if (openPickerId === m.id) { closePicker(); return; }
      closePicker();
      openPickerId = m.id;
      const picker = document.createElement("div");
      picker.className = "react-picker";
      STAMPS.forEach(s => {
        const btn = document.createElement("button");
        btn.textContent = s;
        btn.addEventListener("click", (e2) => {
          e2.stopPropagation();
          sendReaction(m.id, s);
          closePicker();
        });
        picker.appendChild(btn);
      });
      wrap.appendChild(picker);
    });
    row.appendChild(trigger);
  }

  return row;
}

/* =========================================================
   入力まわり
   ========================================================= */
const $input = () => $("input");
const $send  = () => $("sendBtn");

document.addEventListener("input", (e) => {
  if (e.target.id !== "input") return;
  $send().disabled = e.target.value.trim() === "";
  e.target.style.height = "auto";
  e.target.style.height = Math.min(e.target.scrollHeight, 120) + "px";
});

function submitText() {
  const v = $input().value.trim();
  if (!v) return;
  sendMessage(v);
  $input().value = ""; $input().style.height = "auto"; $send().disabled = true;
}
$("sendBtn").addEventListener("click", submitText);

$("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); submitText(); }
});

document.addEventListener("click", () => closePicker());

// ---- メニュー ----
function openMenu() {
  closeMenu();
  const overlay = document.createElement("div");
  overlay.className = "menu-overlay";
  overlay.id = "menuOverlay";
  overlay.addEventListener("click", closeMenu);

  const panel = document.createElement("div");
  panel.className = "menu-panel";
  panel.id = "menuPanel";

  const title = document.createElement("h3");
  title.textContent = "メニュー";
  panel.appendChild(title);

  const info = document.createElement("div");
  info.className = "menu-item";
  if (startedAt) {
    info.innerHTML = `<b>開始</b>　${formatTime(startedAt)}<br><b>最終更新</b>　${formatTime(updatedAt)}`;
  } else {
    info.textContent = "まだ会話は始まっていません";
  }
  panel.appendChild(info);

  const roomInfo = document.createElement("div");
  roomInfo.className = "menu-item";
  roomInfo.innerHTML = `<b>ルームID</b>　${roomId || "—"}`;
  panel.appendChild(roomInfo);

  const resetBtn = document.createElement("button");
  resetBtn.className = "menu-action";
  resetBtn.textContent = "↺ 退出してやり直す";
  resetBtn.addEventListener("click", () => {
    if (!confirm("退出してやり直しますか？（あなたの履歴は消えます）")) return;
    localStorage.removeItem(storeKey());
    if (transport) transport.close();
    location.reload();
  });
  panel.appendChild(resetBtn);

  document.body.appendChild(overlay);
  document.body.appendChild(panel);
}

function closeMenu() {
  const o = $("menuOverlay"); if (o) o.remove();
  const p = $("menuPanel"); if (p) p.remove();
}

$("menuBtn").addEventListener("click", openMenu);
</script>
</body>
</html>
