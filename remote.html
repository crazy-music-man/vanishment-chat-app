<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Van!shment chat</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ロビー -->
  <div id="lobby">
    <p>同じ「あいことば」を入れた二人がつながります。</p>
    <div id="lobbyStatus"></div>
    <div class="room">
      <label for="roomInput" style="font-size:13px;color:var(--muted)">あいことば</label>
      <input id="roomInput" placeholder="" autocomplete="off" />
    </div>
    <div class="lobby-section">
      <button id="startBtn">会話をはじめる</button>
    </div>
  </div>

  <!-- チャット -->
  <header class="hidden" id="chatHeader">
    <button class="shutter-btn" id="captureBtn" title="キャプチャ"></button>
    <div class="header-spacer"></div>
    <button class="menu-btn" id="menuBtn" title="メニュー">☰</button>
  </header>

  <div class="thread hidden" id="thread"></div>

  <div class="composer hidden" id="composer">
    <div class="inputrow">
      <textarea id="input" rows="1" placeholder="メッセージを入力…"></textarea>
      <button class="send" id="sendBtn" disabled>↑</button>
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
